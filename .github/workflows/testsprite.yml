name: Deploy + TestSprite Loop

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PRODUCTION_URL: https://chatdock-app.vercel.app

jobs:
  deploy-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── Deploy frontend to Vercel ──────────────────────
      # Requires: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID in repo secrets
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (production)
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: |
          vercel --prod --yes \
            --token ${{ secrets.VERCEL_TOKEN }} \
            --cwd frontend
          echo "Deployed to ${{ env.PRODUCTION_URL }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Skip deploy (VERCEL_TOKEN not set)
        if: ${{ secrets.VERCEL_TOKEN == '' }}
        run: echo "⚠️  VERCEL_TOKEN not set — skipping deploy, using existing live URL"

      - name: Wait for live URL to respond
        run: |
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.PRODUCTION_URL }})
            if [ "$STATUS" = "200" ]; then
              echo "✓ App is up (HTTP $STATUS)"
              break
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done

      # ── TestSprite ─────────────────────────────────────
      # Requires: TESTSPRITE_API_KEY, TESTSPRITE_PROJECT_ID in repo secrets
      - name: Install TestSprite CLI
        if: ${{ secrets.TESTSPRITE_API_KEY != '' }}
        run: npm install -g @testsprite/testsprite-cli

      - name: Authenticate TestSprite
        if: ${{ secrets.TESTSPRITE_API_KEY != '' }}
        run: testsprite setup --from-env --yes --agent claude
        env:
          TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_API_KEY }}

      - name: Run TestSprite tests
        if: ${{ secrets.TESTSPRITE_API_KEY != '' && secrets.TESTSPRITE_PROJECT_ID != '' }}
        id: testsprite
        run: |
          testsprite test create \
            --project ${{ secrets.TESTSPRITE_PROJECT_ID }} \
            --type frontend \
            --run --wait \
            --output json > testsprite-result.json 2>&1
          cat testsprite-result.json
        continue-on-error: true
        env:
          TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_API_KEY }}

      - name: Skip TestSprite (secrets not set)
        if: ${{ secrets.TESTSPRITE_API_KEY == '' }}
        run: echo "⚠️  TESTSPRITE_API_KEY not set — skipping TestSprite. Add it in repo Settings → Secrets."

      - name: Upload TestSprite results
        uses: actions/upload-artifact@v4
        if: ${{ secrets.TESTSPRITE_API_KEY != '' }}
        with:
          name: testsprite-results-${{ github.run_number }}
          path: testsprite-result.json
          retention-days: 14

      # ── Append one line to LOOP.md ─────────────────────
      - name: Update LOOP.md
        if: ${{ secrets.TESTSPRITE_API_KEY != '' }}
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          PASS_FAIL=$(python3 -c "
          import json, sys
          try:
            with open('testsprite-result.json') as f:
              d = json.load(f)
            status = d.get('status', d.get('result', 'unknown'))
            print('PASS' if str(status).lower() in ['pass','passed','success'] else 'FAIL')
          except:
            print('UNKNOWN')
          " 2>/dev/null || echo "UNKNOWN")

          echo "| $TIMESTAMP | Claude Code | $COMMIT_MSG | $PASS_FAIL |" >> LOOP.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add LOOP.md
          git diff --staged --quiet || git commit -m "loop: $PASS_FAIL — $TIMESTAMP [skip ci]"
          git push
