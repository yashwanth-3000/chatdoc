name: Deploy + TestSprite Loop

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PRODUCTION_URL: https://chatdock-app.vercel.app
      HAS_VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN != '' }}
      HAS_TESTSPRITE: ${{ secrets.TESTSPRITE_API_KEY != '' && secrets.TESTSPRITE_PROJECT_ID != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── Deploy frontend to Vercel ──────────────────────
      - name: Install Vercel CLI
        if: env.HAS_VERCEL_TOKEN == 'true'
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (production)
        if: env.HAS_VERCEL_TOKEN == 'true'
        run: |
          vercel --prod --yes \
            --token ${{ secrets.VERCEL_TOKEN }} \
            --cwd frontend
          echo "Deployed to ${{ env.PRODUCTION_URL }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Skip deploy (VERCEL_TOKEN not set)
        if: env.HAS_VERCEL_TOKEN == 'false'
        run: echo "VERCEL_TOKEN not set — skipping deploy, using existing live URL"

      - name: Wait for live URL to respond
        run: |
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.PRODUCTION_URL }})
            if [ "$STATUS" = "200" ]; then
              echo "App is up (HTTP $STATUS)"
              break
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done

      # ── TestSprite ─────────────────────────────────────
      - name: Install TestSprite CLI
        if: env.HAS_TESTSPRITE == 'true'
        run: npm install -g @testsprite/testsprite-cli

      - name: Authenticate TestSprite
        if: env.HAS_TESTSPRITE == 'true'
        run: testsprite setup --from-env --yes --agent claude
        env:
          TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_API_KEY }}

      - name: Run TestSprite tests (rerun all saved tests)
        if: env.HAS_TESTSPRITE == 'true'
        id: testsprite
        run: |
          set +e
          testsprite test rerun --all \
            --project ${{ secrets.TESTSPRITE_PROJECT_ID }} \
            --wait --timeout 1500 \
            --output json > testsprite-result.json 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          cat testsprite-result.json
          exit 0
        env:
          TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_API_KEY }}

      - name: Skip TestSprite (secrets not set)
        if: env.HAS_TESTSPRITE == 'false'
        run: echo "TESTSPRITE_API_KEY or TESTSPRITE_PROJECT_ID not set — add them in repo Settings → Secrets"

      - name: Upload TestSprite results
        uses: actions/upload-artifact@v4
        if: env.HAS_TESTSPRITE == 'true'
        with:
          name: testsprite-results-${{ github.run_number }}
          path: testsprite-result.json
          retention-days: 14

      # ── Append one line to LOOP.md ─────────────────────
      - name: Update LOOP.md
        if: env.HAS_TESTSPRITE == 'true'
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          if [ "${{ steps.testsprite.outputs.exit_code }}" = "0" ]; then
            PASS_FAIL="PASS"
          else
            PASS_FAIL="FAIL (exit ${{ steps.testsprite.outputs.exit_code }})"
          fi

          echo "| $TIMESTAMP | GitHub Actions | Rerun all saved tests after: $COMMIT_MSG | $PASS_FAIL |" >> LOOP.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add LOOP.md
          git diff --staged --quiet || git commit -m "loop: $PASS_FAIL — $TIMESTAMP [skip ci]"
          git pull --rebase origin main
          git push
